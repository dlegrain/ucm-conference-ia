<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#g1)"/>
  <!-- AI brain/circuit icon -->
  <!-- Central node -->
  <circle cx="16" cy="16" r="2.5" fill="white"/>
  <!-- Orbiting nodes -->
  <circle cx="9" cy="10" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="23" cy="10" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="9" cy="22" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="23" cy="22" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="16" cy="7"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="16" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <!-- Connections -->
  <line x1="16" y1="16" x2="9"  y2="10" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="23" y2="10" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="9"  y2="22" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="23" y2="22" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="16" y2="7"  stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="16" y2="25" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <!-- Cross connections -->
  <line x1="9"  y1="10" x2="16" y2="7"  stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="23" y1="10" x2="16" y2="7"  stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="9"  y1="22" x2="16" y2="25" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="23" y1="22" x2="16" y2="25" stroke="white" stroke-width="0.8" opacity="0.35"/>
</svg>
